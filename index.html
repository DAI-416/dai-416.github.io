<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI动态追踪 | AI Product Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;1,9..40,400&family=Space+Grotesk:wght@400;500;600;700&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0b;
            --bg-secondary: #111113;
            --bg-tertiary: #18181b;
            --bg-card: #1c1c1f;
            --bg-hover: #242428;
            --text-primary: #fafafa;
            --text-secondary: #a1a1aa;
            --text-muted: #71717a;
            --accent-primary: #f97316;
            --accent-secondary: #fb923c;
            --accent-glow: rgba(249, 115, 22, 0.15);
            --border-subtle: rgba(255, 255, 255, 0.06);
            --border-active: rgba(249, 115, 22, 0.4);
            --success: #22c55e;
            --warning: #eab308;
            --error: #ef4444;
            --info: #3b82f6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
        }

        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--border-subtle);
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .logo {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 700;
            color: white;
            font-family: 'Space Grotesk', sans-serif;
        }

        .logo-text h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .logo-text p {
            font-size: 13px;
            color: var(--text-muted);
        }

        .header-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .refresh-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            color: var(--text-secondary);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .refresh-btn:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
            border-color: var(--border-active);
        }

        .refresh-btn.loading svg {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .last-update {
            font-size: 12px;
            color: var(--text-muted);
        }

        .filter-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .search-box {
            flex: 1;
            min-width: 280px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 12px 16px 12px 44px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-subtle);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--border-active);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .search-box input::placeholder {
            color: var(--text-muted);
        }

        .search-box svg {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            color: var(--text-muted);
        }

        .filter-select {
            padding: 12px 16px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-subtle);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 14px;
            cursor: pointer;
            min-width: 140px;
        }

        .filter-select:focus {
            outline: none;
            border-color: var(--border-active);
        }

        .tab-bar {
            display: flex;
            gap: 4px;
            background: var(--bg-secondary);
            padding: 4px;
            border-radius: 12px;
            margin-bottom: 24px;
        }

        .tab-btn {
            padding: 10px 20px;
            background: transparent;
            border: none;
            border-radius: 8px;
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tab-btn:hover {
            color: var(--text-primary);
        }

        .tab-btn.active {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .tab-btn .badge {
            background: var(--accent-primary);
            color: white;
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 20px;
            font-weight: 600;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 20px;
        }

        .product-card {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 16px;
            padding: 24px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .product-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .product-card:hover {
            border-color: var(--border-active);
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .product-card:hover::before {
            opacity: 1;
        }

        .product-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }

        .product-logo {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 700;
            color: white;
        }

        .product-actions {
            display: flex;
            gap: 8px;
        }

        .icon-btn {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-secondary);
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .icon-btn:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .icon-btn.favorited {
            background: var(--accent-glow);
            border-color: var(--accent-primary);
            color: var(--accent-primary);
        }

        .product-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .product-company {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 12px;
        }

        .product-meta {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .meta-tag {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            background: var(--bg-secondary);
            border-radius: 6px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .meta-tag.region {
            background: rgba(59, 130, 246, 0.1);
            color: var(--info);
        }

        .meta-tag.date {
            background: rgba(34, 197, 94, 0.1);
            color: var(--success);
        }

        .meta-tag.category {
            background: rgba(168, 85, 247, 0.1);
            color: #a855f7;
        }

        .product-description {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.7;
            margin-bottom: 16px;
        }

        .product-features {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 16px;
        }

        .feature-tag {
            padding: 6px 12px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-subtle);
            border-radius: 6px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .product-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 16px;
            border-top: 1px solid var(--border-subtle);
        }

        .product-link {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--accent-primary);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.2s ease;
        }

        .product-link:hover {
            color: var(--accent-secondary);
        }

        .tech-stack {
            display: flex;
            gap: 6px;
        }

        .tech-tag {
            padding: 4px 8px;
            background: var(--bg-tertiary);
            border-radius: 4px;
            font-size: 11px;
            color: var(--text-muted);
        }

        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-muted);
        }

        .empty-state svg {
            width: 64px;
            height: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .stats-bar {
            display: flex;
            gap: 24px;
            margin-bottom: 24px;
            padding: 16px 20px;
            background: var(--bg-secondary);
            border-radius: 12px;
            border: 1px solid var(--border-subtle);
        }

        .stat-item {
            display: flex;
            flex-direction: column;
        }

        .stat-value {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-muted);
        }

        .notification {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 16px 24px;
            background: var(--bg-card);
            border: 1px solid var(--border-active);
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            gap: 12px;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .notification.show {
            transform: translateY(0);
            opacity: 1;
        }

        .notification-icon {
            width: 32px;
            height: 32px;
            background: var(--accent-glow);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent-primary);
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .modal-overlay.show {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 32px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }

        .modal-overlay.show .modal {
            transform: scale(1);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .modal-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 24px;
            font-weight: 600;
        }

        .modal-close {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-secondary);
            border: none;
            border-radius: 10px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .modal-close:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .favorites-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .favorite-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            background: var(--bg-secondary);
            border-radius: 10px;
            transition: background 0.2s ease;
        }

        .favorite-item:hover {
            background: var(--bg-hover);
        }

        .favorite-item-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .favorite-item-logo {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 600;
            color: white;
        }

        .favorite-item-name {
            font-weight: 500;
        }

        .favorite-item-company {
            font-size: 12px;
            color: var(--text-muted);
        }

        .no-favorites {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }

        .news-modal-content {
            line-height: 1.8;
            color: var(--text-secondary);
            font-size: 15px;
            max-height: 60vh;
            overflow-y: auto;
        }

        .news-modal-content h4 {
            color: var(--text-primary);
            font-size: 16px;
            margin-bottom: 12px;
        }

        .news-modal-content p {
            margin-bottom: 12px;
        }

        .news-modal-footer {
            margin-top: 24px;
            padding-top: 16px;
            border-top: 1px solid var(--border-subtle);
            display: flex;
            justify-content: flex-end;
        }

        .news-modal-source-link {
            color: var(--accent-primary);
            font-size: 14px;
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .news-modal-source-link:hover {
            color: var(--accent-secondary);
        }

        @media (max-width: 768px) {
            .app-container {
                padding: 16px;
            }

            header {
                flex-direction: column;
                gap: 16px;
                align-items: flex-start;
            }

            .products-grid {
                grid-template-columns: 1fr;
            }

            .filter-bar {
                flex-direction: column;
            }

            .search-box {
                min-width: 100%;
            }
        }

        .news-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .news-header-bar {
            grid-column: 1 / -1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            margin-bottom: 8px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .news-search-box {
            display: flex;
            align-items: center;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-subtle);
            border-radius: 24px;
            padding: 4px 16px;
            flex: 1;
            max-width: 400px;
            min-width: 200px;
        }

        .news-search-box input {
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-primary);
            font-size: 14px;
            width: 100%;
            padding: 6px 0;
        }

        .news-search-box input::placeholder {
            color: var(--text-muted);
        }

        .news-search-clear {
            cursor: pointer;
            color: var(--text-muted);
            font-size: 14px;
            padding: 4px;
            margin-left: 8px;
        }

        .news-search-clear:hover {
            color: var(--text-primary);
        }

        .news-count-info {
            grid-column: 1 / -1;
            font-size: 13px;
            color: var(--text-muted);
            padding: 8px 0;
            margin-bottom: 8px;
        }

        .news-time-filter {
            grid-column: 1 / -1;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            margin-bottom: 16px;
            color: white;
        }

        .time-filter-icon {
            font-size: 16px;
        }

        .time-filter-text {
            font-size: 14px;
            font-weight: 600;
        }

        .time-filter-range {
            font-size: 12px;
            opacity: 0.9;
            margin-left: auto;
        }

        .news-empty {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 16px;
        }

        .news-empty-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .news-empty-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .news-empty-desc {
            font-size: 14px;
            color: var(--text-muted);
        }

        .news-pagination {
            grid-column: 1 / -1;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px;
            padding: 24px 0;
            margin-top: 16px;
        }

        .page-btn {
            padding: 10px 20px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .page-btn:hover:not(.disabled) {
            background: var(--accent-color);
            border-color: var(--accent-color);
            color: white;
        }

        .page-btn.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .page-info {
            font-size: 14px;
            color: var(--text-muted);
            padding: 0 12px;
        }

        .news-grid mark {
            background: #FFE066;
            color: #333;
            padding: 1px 3px;
            border-radius: 3px;
        }

        .news-auto-update {
            font-size: 13px;
            color: var(--text-muted);
            background: var(--bg-tertiary);
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid var(--border-subtle);
            white-space: nowrap;
        }

        .news-card {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 16px;
            padding: 24px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .news-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .news-card:hover {
            border-color: var(--border-active);
            transform: translateY(-2px);
            background: var(--bg-hover);
        }

        .news-card:hover::before {
            opacity: 1;
        }

        .news-card.hot {
            border-color: rgba(239, 68, 68, 0.3);
        }

        .news-card.hot::before {
            background: linear-gradient(90deg, #ef4444, #f97316);
            opacity: 1;
        }

        .news-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .news-hot {
            background: linear-gradient(135deg, #ef4444, #f97316);
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .news-date {
            color: var(--text-muted);
            font-size: 13px;
        }

        .news-title {
            font-family: 'Noto Serif SC', serif;
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 12px;
            line-height: 1.5;
        }

        .news-summary {
            color: var(--text-secondary);
            font-size: 14px;
            line-height: 1.7;
            margin-bottom: 16px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .news-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 12px;
            border-top: 1px solid var(--border-subtle);
        }

        .news-source {
            color: var(--text-muted);
            font-size: 13px;
        }

        .news-read-more {
            color: var(--accent-primary);
            font-size: 13px;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .news-card:hover .news-read-more {
            color: var(--accent-secondary);
        }

        @media (max-width: 768px) {
            .news-grid {
                grid-template-columns: 1fr;
            }
        }

        .fade-in {
            animation: fadeIn 0.5s ease forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .stagger-1 { animation-delay: 0.05s; }
        .stagger-2 { animation-delay: 0.1s; }
        .stagger-3 { animation-delay: 0.15s; }
        .stagger-4 { animation-delay: 0.2s; }
        .stagger-5 { animation-delay: 0.25s; }
        .stagger-6 { animation-delay: 0.3s; }
    </style>
</head>
<body>
    <div class="app-container">
        <header>
            <div class="logo-section">
                <div class="logo">AI</div>

        function getInitials(name) {
            return name.split(' ').map(w => w[0]).join('').substring(0, 2).toUpperCase();
        }

        function getCategoryLabel(category) {
            const labels = {
                'LLM': '大语言模型',
                'Multimodal': '多模态模型',
                'Image': '图像生成',
                'Video': '视频生成',
                'Audio': '音频/音乐',

                'Search': 'AI搜索',
                'Assistant': 'AI助手',
                'Agent': 'AI智能体',
                'Writing': 'AI写作',
                'Learning': 'AI学习'
            };
            return labels[category] || category;
        }

        function formatDate(dateStr) {
            const date = new Date(dateStr);
            const now = new Date();
            const diff = now - date;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            
            if (days === 0) return '今天';
            if (days === 1) return '昨天';
            if (days < 7) return `${days}天前`;
            return date.toLocaleDateString('zh-CN');
        }

        function isFavorite(id) {
            return favorites.includes(id);
        }

        function toggleFavorite(id, event) {
            event.stopPropagation();
            if (isFavorite(id)) {
                favorites = favorites.filter(f => f !== id);
            } else {
                favorites.push(id);
            }
            localStorage.setItem('aiFavorites', JSON.stringify(favorites));
            renderProducts();
            updateStats();
            showNotification(isFavorite(id) ? '已添加到收藏' : '已取消收藏');
        }

        function getFilteredProducts() {
            const searchInput = document.getElementById('searchInput').value.toLowerCase();
            const regionFilter = document.getElementById('regionFilter').value;
            const categoryFilter = document.getElementById('categoryFilter').value;

            return aiProducts.filter(product => {
                const matchesSearch = product.name.toLowerCase().includes(searchInput) ||
                    product.company.toLowerCase().includes(searchInput) ||
                    product.description.toLowerCase().includes(searchInput) ||
                    product.features.some(f => f.toLowerCase().includes(searchInput));
                
                const matchesRegion = regionFilter === 'all' || 
                    (regionFilter === 'overseas' && product.region === 'overseas') ||
                    (regionFilter === 'domestic' && product.region === 'domestic');
                
                const matchesCategory = categoryFilter === 'all' || product.category === categoryFilter;

                let matchesTab = true;
                if (currentTab === 'overseas') matchesTab = product.region === 'overseas';
                else if (currentTab === 'domestic') matchesTab = product.region === 'domestic';
                else if (currentTab === 'favorites') matchesTab = isFavorite(product.id);

                return matchesSearch && matchesRegion && matchesCategory && matchesTab;
            });
        }

];

        let crawledNews = [];
        let newsLoading = false;
        let newsLoaded = false;

        async function loadCrawledNews(force = false) {
            if (newsLoading && !force) return;
            if (newsLoaded && !force) return;
            
            newsLoading = true;
            try {
                const response = await fetch('news-data.json', {
                    cache: 'no-cache',
                    headers: { 'Cache-Control': 'no-cache' }
                });
                if (!response.ok) throw new Error('Network response was not ok');
                const data = await response.json();
                
                const newsArray = data.history || data.news || [];
                if (newsArray.length > 0) {
                    crawledNews = newsArray;
                    newsLoaded = true;
                    console.log('✅ 加载了 ' + crawledNews.length + ' 条资讯 (含历史)');
                    if (currentTab === 'news') {
                        renderNews();
                    }
                } else {
                    console.log('⚠️ 数据为空，保留默认数据');
                }
            } catch (e) {
                console.log('⚠️ 无法加载抓取数据: ' + e.message);
            } finally {
                newsLoading = false;
            }
        }

        function refreshNews() {
            newsLoaded = false;
            crawledNews = [];
            loadCrawledNews(true).then(() => {
                showNotification('资讯已刷新');
            });
        }

        function getAllNews() {
            if (crawledNews.length > 0) {
                const today = new Date().toISOString().split('T')[0];
                return crawledNews.map(n => ({
                    title: n.title,
                    link: n.link,
                    date: n.date,
                    source: n.source,
                    region: n.region,
                    hot: n.date === today
                }));
            }
            return [{
                title: '暂无资讯数据',
                link: '#',
                date: new Date().toISOString().split('T')[0],
                source: '系统',
                hot: false,
                summary: '请点击上方"刷新数据"按钮获取最新资讯'
            }];
        }

        let newsSearchQuery = '';
        let newsPage = 1;
        const NEWS_PER_PAGE = 10;

        function getTimeRange() {
            const endDate = new Date();
            const startDate = new Date();
            startDate.setDate(startDate.getDate() - 30);
            return {
                start: startDate.toISOString().split('T')[0],
                end: endDate.toISOString().split('T')[0],
                startDate: startDate,
                endDate: endDate
            };
        }

        function filterByTimeRange(news) {
            const { start, end } = getTimeRange();
            return news.filter(n => {
                const newsDate = n.date || '';
                return newsDate >= start && newsDate <= end;
            });
        }

        function renderNews() {
            const allNews = getAllNews();
            const timeFilteredNews = filterByTimeRange(allNews);
            
            const filteredNews = newsSearchQuery 
                ? timeFilteredNews.filter(n => 
                    n.title.toLowerCase().includes(newsSearchQuery.toLowerCase()) ||
                    (n.summary && n.summary.toLowerCase().includes(newsSearchQuery.toLowerCase())) ||
                    n.source.toLowerCase().includes(newsSearchQuery.toLowerCase())
                  )
                : timeFilteredNews;

            const totalPages = Math.ceil(filteredNews.length / NEWS_PER_PAGE);
            const startIndex = (newsPage - 1) * NEWS_PER_PAGE;
            const pagedNews = filteredNews.slice(startIndex, startIndex + NEWS_PER_PAGE);

            const { start, end } = getTimeRange();
            const timeRangeText = `${start} 至 ${end}`;

            const grid = document.getElementById('productsGrid');
            grid.className = 'news-grid';
            
            let html = `
                <div class="news-header-bar">
                    <div class="news-search-box">
                        <input type="text" 
                               id="newsSearchInput" 
                               placeholder="🔍 搜索资讯..." 
                               value="${newsSearchQuery}"
                               oninput="handleNewsSearch(this.value)">
                        ${newsSearchQuery ? `<span class="news-search-clear" onclick="clearNewsSearch()">✕</span>` : ''}
                    </div>
                    <span class="news-auto-update">🔄 最后更新: ${new Date().toLocaleTimeString('zh-CN', {hour:'2-digit', minute:'2-digit'})}</span>
                </div>
                <div class="news-time-filter">
                    <span class="time-filter-icon">📅</span>
                    <span class="time-filter-text">最近一个月（含今天）</span>
                    <span class="time-filter-range">${timeRangeText}</span>
                </div>
            `;

            if (filteredNews.length === 0) {
                html += `
                    <div class="news-empty">
                        <div class="news-empty-icon">📭</div>
                        <div class="news-empty-title">暂无符合条件的资讯</div>
                        <div class="news-empty-desc">时间范围内没有找到相关资讯，请尝试调整搜索条件或刷新数据</div>
                    </div>
                `;
            } else {
                html += `
                    <div class="news-count-info">
                        ${newsSearchQuery 
                            ? `找到 ${filteredNews.length} 条相关资讯` 
                            : `共 ${filteredNews.length} 条资讯 (最近30天)`}
                    </div>
                `;
                
                html += pagedNews.map(news => `
                    <div class="news-card ${news.hot ? 'hot' : ''}" onclick="window.open('${news.link}', '_blank')">
                        <div class="news-header">
                            ${news.hot ? '<span class="news-hot">🔥 热门</span>' : ''}
                            <span class="news-date">${news.date}</span>
                        </div>
                        <h3 class="news-title">${highlightMatch(news.title, newsSearchQuery)}</h3>
                        <p class="news-summary">${highlightMatch(news.summary || '', newsSearchQuery)}</p>
                        <div class="news-footer">
                            <span class="news-source">${news.source}</span>
                            <span class="news-read-more" onclick="event.stopPropagation(); window.open('${news.link}', '_blank')">阅读全文 →</span>
                        </div>
                    </div>
                `).join('');

                if (totalPages > 1) {
                    html += `
                        <div class="news-pagination">
                            <button class="page-btn ${newsPage === 1 ? 'disabled' : ''}" 
                                    onclick="goToNewsPage(${newsPage - 1})" 
                                    ${newsPage === 1 ? 'disabled' : ''}>
                                上一页
                            </button>
                            <span class="page-info">${newsPage} / ${totalPages}</span>
                            <button class="page-btn ${newsPage === totalPages ? 'disabled' : ''}" 
                                    onclick="goToNewsPage(${newsPage + 1})" 
                                    ${newsPage === totalPages ? 'disabled' : ''}>
                                下一页
                            </button>
                        </div>
                    `;
                }
            }
            
            grid.innerHTML = html;
        }

        function goToNewsPage(page) {
            const allNews = getAllNews();
            const timeFilteredNews = filterByTimeRange(allNews);
            const filteredNews = newsSearchQuery 
                ? timeFilteredNews.filter(n => 
                    n.title.toLowerCase().includes(newsSearchQuery.toLowerCase()) ||
                    (n.summary && n.summary.toLowerCase().includes(newsSearchQuery.toLowerCase())) ||
                    n.source.toLowerCase().includes(newsSearchQuery.toLowerCase())
                  )
                : timeFilteredNews;
            
            const totalPages = Math.ceil(filteredNews.length / NEWS_PER_PAGE);
            
            if (page >= 1 && page <= totalPages) {
                newsPage = page;
                renderNews();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        function handleNewsSearch(query) {
            newsSearchQuery = query;
            newsPage = 1;
            renderNews();
        }

        function clearNewsSearch() {
            newsSearchQuery = '';
            newsPage = 1;
            document.getElementById('newsSearchInput').value = '';
            renderNews();
        }

        function highlightMatch(text, query) {
            if (!query || !text) return text;
            const regex = new RegExp('(' + query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
            return text.replace(regex, '<mark>$1</mark>');
        }

        function refreshData() {
            const btn = document.getElementById('refreshBtn');
            btn.classList.add('loading');
            
            loadCrawledNews(true).then(() => {
                btn.classList.remove('loading');
                updateLastTime();
                const newsCount = crawledNews.length > 0 ? crawledNews.length : 0;
                showNotification(`数据已更新: ${aiProducts.length} 个产品, ${newsCount} 条资讯`);
                if (currentTab === 'news') {
                    renderNews();
                }
            }).catch(() => {
                btn.classList.remove('loading');
                showNotification('数据更新失败，请稍后重试');
            });
        }

        function updateLastTime() {
            const now = new Date();
            document.getElementById('lastUpdate').textContent = '最后更新: ' + now.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
        }

        function showNotification(message) {
            const notification = document.getElementById('notification');
            document.getElementById('notificationText').textContent = message;
            notification.classList.add('show');
            setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }

        function showFavorites() {
            const modal = document.getElementById('favoritesModal');
            const list = document.getElementById('favoritesList');
            
            if (favorites.length === 0) {
                list.innerHTML = '<div class="no-favorites">暂无收藏产品</div>';
            } else {
                const favoriteProducts = aiProducts.filter(p => favorites.includes(p.id));
                list.innerHTML = favoriteProducts.map(product => `
                    <div class="favorite-item">
                        <div class="favorite-item-info">
                            <div class="favorite-item-logo" style="background: ${product.color}">
                                ${getInitials(product.name)}
                            </div>
                            <div>
                                <div class="favorite-item-name">${product.name}</div>
                                <div class="favorite-item-company">${product.company} · ${product.location}</div>
                            </div>
                        </div>
                        <button class="icon-btn" onclick="toggleFavorite(${product.id}, event); showFavorites();" title="取消收藏">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path>
                            </svg>
                        </button>
                    </div>
                `).join('');
            }
            
            modal.classList.add('show');
        }

        function closeFavorites() {
            document.getElementById('favoritesModal').classList.remove('show');
        }

        function showNewsModal(newsId) {
            const news = aiNews.find(n => n.id === newsId);
            if (!news) return;

            document.getElementById('newsModalTitle').textContent = news.title;
            document.getElementById('newsModalContent').innerHTML = `
                <p><strong>📅 发布日期：</strong>${news.date}</p>
                <p><strong>📰 来源：</strong>${news.source}</p>
                ${news.summary ? `<h4>内容摘要</h4><p>${news.summary}</p>` : ''}
                <p style="margin-top: 20px; color: var(--text-muted);">点击下方"查看原文"链接访问原始资讯页面</p>
            `;
            document.getElementById('newsModalLink').href = news.link;
            document.getElementById('newsModal').classList.add('show');
        }

        function closeNewsModal() {
            document.getElementById('newsModal').classList.remove('show');
        }

        document.getElementById('newsModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeNewsModal();
            }
        });

        document.getElementById('favoritesModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeFavorites();
            }
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeFavorites();
                closeNewsModal();
            }
        });

        function autoRefresh() {
            setInterval(() => {
                updateLastTime();
                loadCrawledNews(true).then(() => {
                    if (currentTab === 'news') {
                        renderNews();
                    }
                });
            }, 3600000);
        }

        updateLastTime();
        updateStats();
        loadCrawledNews().then(() => {
            if (currentTab === 'news') {
                renderNews();
            }
        });
        switchTab('all');
        autoRefresh();
    </script>
</body>
</html>
